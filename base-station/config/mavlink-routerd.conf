# Roban Swarm — mavlink-routerd hub configuration (base station)
# Installed to /etc/mavlink-router/main.conf
#
# Architecture:
#   - Each heli has ONE bidirectional Server endpoint (no routing loops)
#   - GCS connects via UDP 14550 or TCP 5760
#   - TCP recommended for Mission Planner (reliable MAVFTP param download)
#
# IMPORTANT: Do NOT use separate in/out ports per heli. This creates a
# routing loop where mavlink-router echoes FC messages back to the
# companion, which re-forwards them, causing exponential amplification
# (7000+ pkt/s instead of ~65). Single Server endpoints avoid this.

[General]
TcpServerPort = 5760
ReportStats = false
MavlinkDialect = ardupilotmega

# GCS endpoint — bidirectional UDP
# Mission Planner / QGC can also connect via TCP on port 5760
[UdpEndpoint gcs]
Mode = Normal
Address = 0.0.0.0
Port = 14550

# --- Heli 01-10: single bidirectional endpoint each ---
[UdpEndpoint heli01]
Mode = Server
Address = 0.0.0.0
Port = 14560

[UdpEndpoint heli02]
Mode = Server
Address = 0.0.0.0
Port = 14561

[UdpEndpoint heli03]
Mode = Server
Address = 0.0.0.0
Port = 14562

[UdpEndpoint heli04]
Mode = Server
Address = 0.0.0.0
Port = 14563

[UdpEndpoint heli05]
Mode = Server
Address = 0.0.0.0
Port = 14564

[UdpEndpoint heli06]
Mode = Server
Address = 0.0.0.0
Port = 14565

[UdpEndpoint heli07]
Mode = Server
Address = 0.0.0.0
Port = 14566

[UdpEndpoint heli08]
Mode = Server
Address = 0.0.0.0
Port = 14567

[UdpEndpoint heli09]
Mode = Server
Address = 0.0.0.0
Port = 14568

[UdpEndpoint heli10]
Mode = Server
Address = 0.0.0.0
Port = 14569
