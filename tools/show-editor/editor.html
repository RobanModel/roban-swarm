<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Roban Swarm — Show Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Roban Swarm — Show Editor</h1>
    <button class="btn" id="btn-new">New</button>
    <button class="btn" id="btn-open">Open…</button>
    <input type="file" id="file-picker" accept=".json" hidden />
    <select id="example-select">
      <option value="">Load example…</option>
      <option value="examples/figure8_single.json">Figure 8 — single heli</option>
      <option value="examples/crossing_two.json">Crossing paths — two helis</option>
      <option value="examples/formation_three.json">Triangle rotation — three helis</option>
    </select>
    <span class="spacer"></span>
    <button class="btn accent" id="btn-save">Save As…</button>
  </header>

  <main>
    <div class="placeholder">
      <h2>Parsed show</h2>
      <div id="issues" class="issues"><span class="ok">No show loaded.</span></div>
      <h2>Model (JSON export preview)</h2>
      <pre class="json-dump" id="dump">—</pre>
      <p class="hint">
        v1 build in progress. This is chunk 1: model + validator + examples.
        Canvas, timeline, and side panels land in later chunks.
      </p>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
